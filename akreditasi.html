<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Akreditasi - Dinas Pendidikan Sumedang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="bg-slate-100 text-slate-900 antialiased min-h-screen flex flex-col">
  <div id="navbar-root"></div>

  <main class="max-w-7xl w-full mx-auto px-4 py-8 flex-1">
    <div class="bg-white rounded-lg shadow p-6 print-area">
      <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 pb-4 mb-4">
        <h2 class="text-xl font-semibold text-slate-800">Data Akreditasi</h2>
        <div id="toolbar"></div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="data-table">
          <thead>
            <tr class="bg-slate-50 text-slate-600 text-left">
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">No</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">NPSN</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">Nama Sekolah</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">Alamat Sekolah</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">Kepala Sekolah</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">Akreditasi</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">Tahun Akreditasi</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">Berakhir Tahun</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide">Nomor SK</th>
              <th class="px-3 py-3 font-semibold text-xs uppercase tracking-wide no-print">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="assets/data.js"></script>
  <script src="assets/components.js"></script>
  <script>
    renderNavbar('akreditasi');
    renderFooter();

    const AKR_OPTS = ['A', 'B', 'C', 'TT', 'Belum'];
    const currentYear = new Date().getFullYear();

    function akColor(a) {
      if (a === 'A') return 'text-emerald-600 font-semibold';
      if (a === 'B') return 'text-blue-600 font-semibold';
      if (a === 'C') return 'text-amber-600 font-semibold';
      return 'text-rose-600 font-semibold';
    }
    function tahunColor(y) {
      if (y < currentYear) return 'bg-rose-200 text-rose-900';
      if (y >= currentYear + 3) return 'bg-emerald-200 text-emerald-900';
      return 'bg-amber-200 text-amber-900';
    }

    function renderTable() {
      const rows = DB.getAkreditasi();
      const tbody = document.getElementById('tbody');
      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10" class="text-center py-10 text-slate-400">Belum ada data. Klik "+ Input Data" untuk menambahkan.</td></tr>`;
      } else {
        tbody.innerHTML = rows.map((r, i) => `
          <tr class="border-t border-slate-100 align-top">
            <td class="px-3 py-3">${i + 1}</td>
            <td class="px-3 py-3">${esc(r.npsn)}</td>
            <td class="px-3 py-3"><span class="text-blue-600 font-medium">${esc(r.namaSekolah)}</span></td>
            <td class="px-3 py-3 max-w-xs"><span class="text-amber-700">${esc(r.alamatSekolah)}</span></td>
            <td class="px-3 py-3">${esc(r.kepalaSekolah)}</td>
            <td class="px-3 py-3"><span class="${akColor(r.akreditasi)}">${esc(r.akreditasi)}</span></td>
            <td class="px-3 py-3">${esc(r.tahunAkreditasi)}</td>
            <td class="px-3 py-3"><span class="inline-block px-3 py-1 rounded font-bold ${tahunColor(Number(r.berakhirTahun))}">${esc(r.berakhirTahun)}</span></td>
            <td class="px-3 py-3">${esc(r.nomorSk)}</td>
            <td class="px-3 py-3 no-print">${actionButtonsHtml(r.id, 'akreditasi')}</td>
          </tr>
        `).join('');
      }

      // Update toolbar PDF rows
      renderToolbar('toolbar', {
        onAdd: () => openForm(),
        printTitle: 'Data Akreditasi - Dinas Pendidikan Sumedang',
        pdf: {
          title: 'DATA AKREDITASI SKB/PKBM TAHUN 2026',
          filename: 'data-akreditasi-' + new Date().toISOString().slice(0, 10) + '.pdf',
          columns: [
            { header: 'No', dataKey: 'no' },
            { header: 'NPSN', dataKey: 'npsn' },
            { header: 'Nama Sekolah', dataKey: 'namaSekolah' },
            { header: 'Alamat Sekolah', dataKey: 'alamatSekolah' },
            { header: 'Kepala Sekolah', dataKey: 'kepalaSekolah' },
            { header: 'Akreditasi', dataKey: 'akreditasi' },
            { header: 'Tahun Akreditasi', dataKey: 'tahunAkreditasi' },
            { header: 'Berakhir Tahun', dataKey: 'berakhirTahun' },
            { header: 'Nomor SK', dataKey: 'nomorSk' },
          ],
          rows: rows.map((r, i) => ({ ...r, no: i + 1 })),
        },
      });

      // Wire row actions
      tbody.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = Number(btn.dataset.id);
          if (btn.dataset.action === 'edit') openForm(id);
          else handleDelete(id);
        });
      });
    }

    function openForm(editId) {
      const editing = editId ? DB.getAkreditasi().find(r => r.id === editId) : null;
      const v = editing || {
        npsn: '', namaSekolah: '', alamatSekolah: '', kepalaSekolah: '',
        akreditasi: 'B', tahunAkreditasi: currentYear, berakhirTahun: currentYear + 5, nomorSk: '',
      };
      const title = editing ? 'Edit Data Akreditasi' : 'Input Data Akreditasi';
      const body = `
        <form id="modal-form" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${field('NPSN', `<input name="npsn" value="${esc(v.npsn)}" class="input" required>`, true)}
            ${field('Nama Sekolah', `<input name="namaSekolah" value="${esc(v.namaSekolah)}" class="input" required>`, true)}
          </div>
          ${field('Alamat Sekolah', `<textarea name="alamatSekolah" class="input min-h-[60px]" required>${esc(v.alamatSekolah)}</textarea>`, true)}
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${field('Kepala Sekolah', `<input name="kepalaSekolah" value="${esc(v.kepalaSekolah)}" class="input" required>`, true)}
            ${field('Akreditasi', `<select name="akreditasi" class="input" required>${AKR_OPTS.map(o => `<option value="${o}" ${o === v.akreditasi ? 'selected' : ''}>${o}</option>`).join('')}</select>`, true)}
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${field('Tahun Akreditasi', `<input type="number" name="tahunAkreditasi" min="2000" max="2099" value="${esc(v.tahunAkreditasi)}" class="input" required>`, true)}
            ${field('Berakhir Tahun', `<input type="number" name="berakhirTahun" min="2000" max="2099" value="${esc(v.berakhirTahun)}" class="input" required>`, true)}
          </div>
          ${field('Nomor SK', `<input name="nomorSk" value="${esc(v.nomorSk)}" class="input" placeholder="Contoh: 602/BAN-PDM/SK/2025" required>`, true)}
          <div class="flex justify-end gap-2 pt-2">
            <button type="button" id="modal-cancel" class="px-4 py-2 text-sm rounded border border-slate-300 text-slate-700 hover:bg-slate-50">Batal</button>
            <button type="submit" class="px-4 py-2 text-sm rounded bg-blue-600 text-white hover:bg-blue-700">${editing ? 'Update' : 'Simpan'}</button>
          </div>
        </form>
      `;
      openModal(title, body, () => {
        document.getElementById('modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-form').addEventListener('submit', (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const row = {
            npsn: fd.get('npsn'),
            namaSekolah: fd.get('namaSekolah'),
            alamatSekolah: fd.get('alamatSekolah'),
            kepalaSekolah: fd.get('kepalaSekolah'),
            akreditasi: fd.get('akreditasi'),
            tahunAkreditasi: Number(fd.get('tahunAkreditasi')),
            berakhirTahun: Number(fd.get('berakhirTahun')),
            nomorSk: fd.get('nomorSk'),
          };
          if (editing) DB.updateAkreditasi(editId, row);
          else DB.addAkreditasi(row);
          closeModal();
          renderTable();
        });
      });
    }

    function handleDelete(id) {
      const row = DB.getAkreditasi().find(r => r.id === id);
      if (!row) return;
      if (!confirm(`Hapus data "${row.namaSekolah}"?`)) return;
      DB.deleteAkreditasi(id);
      renderTable();
    }

    function field(label, controlHtml, required) {
      return `<label class="block"><span class="text-xs font-medium text-slate-700">${label} ${required ? '<span class="text-rose-500">*</span>' : ''}</span><div class="mt-1">${controlHtml}</div></label>`;
    }

    renderTable();
  </script>
</body>
</html>
